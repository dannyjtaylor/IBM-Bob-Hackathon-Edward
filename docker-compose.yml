version: '3.8'

services:
  edward:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edward-assistant
    restart: unless-stopped
    
    # Environment variables from .env file
    env_file:
      - .env
    
    # Volume mounts for persistence
    volumes:
      # Mount .env for configuration
      - ./.env:/app/.env:ro
      
      # Mount vault for password storage
      - ./data:/app/data
      
      # Mount logs directory
      - ./logs:/app/logs
      
      # Mount user's Desktop (read-only for safety)
      - ${HOME}/Desktop:/host/Desktop:ro
      
      # Mount user's Documents (read-only for safety)
      - ${HOME}/Documents:/host/Documents:ro
    
    # Network configuration
    networks:
      - edward-network
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    
    # Depends on Bob API if running locally
    depends_on:
      - bob-api
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  bob-api:
    # IBM Bob API container (if self-hosted)
    # Replace with actual Bob API image when available
    image: ibm-bob-api:latest
    container_name: bob-api
    restart: unless-stopped
    
    ports:
      - "6700:6700"
    
    environment:
      - BOB_API_PORT=6700
    
    networks:
      - edward-network
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

networks:
  edward-network:
    driver: bridge

volumes:
  edward-data:
    driver: local
  edward-logs:
    driver: local

# Made with Bob
